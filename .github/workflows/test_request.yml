name: Test
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          for i in {1..25}; do
            curl -s "https://zinro.net/m/room_in.php" \
              -b "session_key=$i" \
              -d "mode=submit&room_name=村名&rom=1&speed=1" \
              --data-urlencode "player_name=感染$(tr -dc A-Z < /dev/urandom | head -c 6)"
            sleep 0.1
          done
