name: Zinro Message Bot

on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Script
        run: |
          node -e "
          const https = require('https');

          async function sendMessage(i) {
            const randomNumber = Math.floor(Math.random() * 101);
            const url = \`https://zinro.net/m/player.php?mode=message&to_user=%E4%BA%BA%E7%8B%BC&message=\${randomNumber}\`;
            
            const options = {
              headers: {
                'Cookie': 'session_key=4'
              }
            };

            return new Promise((resolve) => {
              https.get(url, options, (res) => {
                console.log(\`[\${i}/50] 送信完了: 乱数=\${randomNumber} ステータス=\${res.statusCode}\`);
                resolve();
              }).on('error', (e) => {
                console.error(\`エラー: \${e.message}\`);
                resolve();
              });
            });
          }

          async function main() {
            for (let i = 1; i <= 50; i++) {
              await sendMessage(i);
              if (i < 50) {
                console.log('5秒待機中...');
                await new Promise(resolve => setTimeout(resolve, 10));
              }
            }
            console.log('すべての送信が完了しました。');
          }

          main();
          "
