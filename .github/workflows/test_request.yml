name: T
on: workflow_dispatch
jobs:
  r:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k: [1..25] # これにより5台のサーバーが並列起動
    steps:
      - run: |
          P=$(tr -dc A-Z </dev/urandom | head -c6)
          U="https://zinro.net/m"
          H="Cookie: session_key=${{ matrix.k }}"
          curl -s "$U/menu.php" -H "$H"
          sleep 1
          curl -s "$U/room_in.php" -H "$H" -d "mode=submit&player_name=感染$P&room_name=SON&rom=1&speed=1&trip_open=1"
