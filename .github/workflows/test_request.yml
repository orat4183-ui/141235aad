name: Zinro
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Zinro"]
    types: [completed]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          node -e "const h=require('https');h.get('https://zinro.net/m/player.php?mode=message&to_user=%E4%BA%BA%E7%8B%BC&message='+Math.floor(Math.random()*101),{headers:{'Cookie':'session_key=2'}})"
          sleep 0.1
