name: Functional Test Message Sender (Fast)

on:
  workflow_dispatch:

jobs:
  send_messages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        session_id: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false

    steps:
      - name: Send Messages
        run: |
          for i in {1..10}
          do
            RANDOM_VAL=$((RANDOM % 101))
            
            echo "Attempt $i for Session ${{ matrix.session_id }}: Value $RANDOM_VAL"
            
            curl -G "https://zinro.net/m/player.php" \
              --data-urlencode "mode=message" \
              --data-urlencode "to_user=ALL" \
              --data-urlencode "message=$RANDOM_VAL" \
              --cookie "session_key=${{ matrix.session_id }}" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            
            if [ $i -lt 2 ]; then
              # 0.011秒待機
              sleep 0.01
            fi
          done
